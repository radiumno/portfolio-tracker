name: 功能请求
description: 为新功能或改进提出建议
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交功能请求！
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个功能解决了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望看到什么变化？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
  - type: dropdown
    id: phase
    attributes:
      label: 所属阶段
      options:
        - P1 数据采集
        - P2 标的体检
        - P3 组合分析
        - P4 理论评估
        - P5 辩论引擎
        - P6 风险评估
        - P7 操作推荐
        - 基础设施/UI
